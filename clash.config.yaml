proxy-groups:
- name: PROXY
  type: select
  proxies:
  - LOAD-BALANCE
  - SELECT
  - FALLBACK
  - DIRECT
- name: SELECT
  type: select
  proxies: &id001
  - 美国 002
  - 荷兰 002
  - 保加利亚 001
  - 爱尔兰 001
  - 美国 021
  - 美国 001
  - 加拿大 001
  - 加拿大 002
  - 美国 003
  - 美国 004
  - 加拿大 003
  - 加拿大 004
  - 加拿大 005
  - 加拿大 006
- name: LOAD-BALANCE
  type: load-balance
  url: https://cp.cloudflare.com/generate_204
  interval: 3600
  strategy: consistent-hashing
  proxies: *id001
- name: FALLBACK
  type: fallback
  url: https://cp.cloudflare.com/generate_204
  interval: 3600
  proxies: *id001
- name: GITHUB
  type: select
  proxies: &id002
  - PROXY
  - LOAD-BALANCE
  - SELECT
  - FALLBACK
  - DIRECT
- name: OPENAI
  type: select
  proxies: *id002
- name: NETFLIX
  type: select
  proxies: *id002
- name: BLOCK
  type: select
  proxies:
  - REJECT
  - DIRECT
- name: FINAL
  type: select
  proxies:
  - PROXY
  - DIRECT
rules:
- RULE-SET,proxy-classical,PROXY
- RULE-SET,direct-classical,DIRECT
- RULE-SET,block,BLOCK
- RULE-SET,applications,DIRECT
- RULE-SET,icloud,DIRECT
- RULE-SET,apple,DIRECT
- RULE-SET,github,GITHUB
- RULE-SET,openai,OPENAI
- RULE-SET,netflix,NETFLIX
- RULE-SET,google,PROXY
- RULE-SET,youtube,PROXY
- RULE-SET,telegram,PROXY
- RULE-SET,spotify,PROXY
- RULE-SET,gfw,PROXY
- GEOIP,LAN,DIRECT,no-resolve
- GEOIP,CN,DIRECT
- MATCH,FINAL
